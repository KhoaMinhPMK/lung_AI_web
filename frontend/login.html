<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — MedVision AI</title>
  <meta name="description" content="Hệ thống hỗ trợ chẩn đoán hình ảnh y khoa bằng trí tuệ nhân tạo">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 30%, #0d1b3e 60%, #071028 100%);
      overflow: hidden;
      position: relative;
    }

    /* Animated mesh gradient background */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-mesh .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: orbFloat 15s ease-in-out infinite;
    }

    .bg-mesh .orb:nth-child(1) {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.5), transparent 70%);
      top: -15%;
      right: -10%;
      animation-duration: 18s;
    }

    .bg-mesh .orb:nth-child(2) {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.4), transparent 70%);
      bottom: -10%;
      left: -5%;
      animation-delay: -6s;
      animation-duration: 22s;
    }

    .bg-mesh .orb:nth-child(3) {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.3), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -12s;
      animation-duration: 20s;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(40px, -30px) scale(1.1);
      }

      66% {
        transform: translate(-30px, 20px) scale(0.9);
      }
    }

    /* Grid pattern */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* Login card */
    .login-card {
      position: relative;
      z-index: 1;
      width: 440px;
      max-width: 92vw;
      background: rgba(15, 20, 50, 0.7);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 120px rgba(59, 130, 246, 0.08);
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Logo */
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.35);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {

      0%,
      100% {
        box-shadow: 0 8px 32px rgba(59, 130, 246, 0.35);
      }

      50% {
        box-shadow: 0 8px 48px rgba(59, 130, 246, 0.5);
      }
    }

    .login-logo h1 {
      color: #f1f5f9;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .login-logo .subtitle {
      color: rgba(148, 163, 184, 0.7);
      font-size: 14px;
      margin-top: 6px;
      font-weight: 400;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 16px;
      color: rgba(148, 163, 184, 0.5);
      font-size: 15px;
      pointer-events: none;
      z-index: 1;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: #f1f5f9;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.25s ease;
    }

    .input-wrapper input::placeholder {
      color: rgba(148, 163, 184, 0.35);
    }

    .input-wrapper input:focus {
      border-color: rgba(59, 130, 246, 0.6);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    .input-wrapper input:focus+.input-icon,
    .input-wrapper input:focus~.input-icon {
      color: #3b82f6;
    }

    /* Password toggle — INLINE POSITIONED */
    .toggle-pw {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(148, 163, 184, 0.5);
      font-size: 15px;
      cursor: pointer;
      z-index: 2;
      padding: 4px;
      border: none;
      background: none;
      transition: color 0.2s;
    }

    .toggle-pw:hover {
      color: #e2e8f0;
    }

    .pw-input {
      padding-right: 48px !important;
    }

    /* Button */
    .btn-login {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #8b5cf6 100%);
      background-size: 200% 200%;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.35);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.45);
      background-position: right center;
    }

    .btn-login:hover::before {
      transform: translateX(100%);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .d-none {
      display: none !important;
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: rgba(148, 163, 184, 0.3);
    }

    /* Divider */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 20px;
      color: rgba(148, 163, 184, 0.25);
      font-size: 12px;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }

    /* Demo hint */
    .demo-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(59, 130, 246, 0.06);
      border: 1px solid rgba(59, 130, 246, 0.12);
      border-radius: 12px;
      font-size: 12px;
      color: rgba(148, 163, 184, 0.7);
      line-height: 1.5;
    }

    .demo-hint i {
      color: #3b82f6;
      font-size: 14px;
      flex-shrink: 0;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      color: white;
      background: rgba(34, 197, 94, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.9);
    }

    .toast.warning {
      background: rgba(245, 158, 11, 0.9);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px;
        border-radius: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- Animated Background -->
  <div class="bg-mesh">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🫁</div>
      <h1>MedVision AI</h1>
      <p class="subtitle">Hệ thống hỗ trợ chẩn đoán y khoa</p>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="username">Tên đăng nhập</label>
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
          <i class="fa-regular fa-user input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mật khẩu</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="pw-input" placeholder="Nhập mật khẩu" required
            autocomplete="current-password">
          <i class="fa-solid fa-lock input-icon"></i>
          <button type="button" class="toggle-pw" id="togglePassword" title="Hiện/ẩn mật khẩu">
            <i class="fa-regular fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span id="loginText">Đăng nhập</span>
        <span id="loginSpinner" class="d-none"><i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...</span>
      </button>
    </form>

    <div class="login-divider">Demo Mode</div>

    <div class="demo-hint">
      <i class="fa-solid fa-circle-info"></i>
      <span>Nhập bất kỳ tên đăng nhập & mật khẩu để vào hệ thống demo.<br>VD: <strong>admin</strong> /
        <strong>123456</strong></span>
    </div>

    <div class="login-footer">
      © 2026 MedVision AI — Powered by YOLOv8 + Groq
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // Toggle password
    document.getElementById('togglePassword').addEventListener('click', function () {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'fa-regular fa-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'fa-regular fa-eye';
      }
    });

    // Simple toast
    function showLoginToast(text, type) {
      const t = document.getElementById('toast');
      t.textContent = text;
      t.className = 'toast ' + (type || '') + ' show';
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showLoginToast('Vui lòng nhập đầy đủ thông tin', 'warning');
        return;
      }

      // Show loading
      document.getElementById('loginText').classList.add('d-none');
      document.getElementById('loginSpinner').classList.remove('d-none');
      document.getElementById('btnLogin').disabled = true;

      setTimeout(function () {
        // Store user
        const user = {
          id: 1,
          username: username,
          fullName: 'Bác sĩ Nguyễn Văn A',
          specialty: 'Chẩn đoán hình ảnh',
          role: 'doctor',
          loginAt: new Date().toISOString(),
          lastActive: new Date().toISOString()
        };

        localStorage.setItem('medvision_user', JSON.stringify(user));
        showLoginToast('Đăng nhập thành công! Chào mừng ' + user.fullName);

        setTimeout(function () {
          window.location.href = 'index.html';
        }, 600);
      }, 1200);
    });

    // If already logged in, redirect
    try {
      const stored = localStorage.getItem('medvision_user');
      if (stored) {
        const u = JSON.parse(stored);
        if (u && u.loginAt) window.location.href = 'index.html';
      }
    } catch (e) { }
  </script>
</body>

</html>
