<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — MedVision AI</title>
  <meta name="description" content="Hệ thống hỗ trợ chẩn đoán khối u phổi bằng trí tuệ nhân tạo">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
  <div class="login-page">
    <!-- Animated background circles -->
    <div class="login-bg">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon-lg">🫁</div>
        <h1>MedVision AI</h1>
        <p>Hệ thống hỗ trợ chẩn đoán y khoa</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập</label>
          <div class="form-input-icon">
            <i class="fa-regular fa-user icon"></i>
            <input type="text" id="username" class="form-input" placeholder="Nhập tên đăng nhập" required
              autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Mật khẩu</label>
          <div class="form-input-icon">
            <i class="fa-solid fa-lock icon"></i>
            <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu" required
              autocomplete="current-password">
            <i class="fa-regular fa-eye icon icon-right" id="togglePassword"></i>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span id="loginText">Đăng nhập</span>
          <span id="loginSpinner" class="d-none"><i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...</span>
        </button>
      </form>

      <div class="login-footer">
        © 2026 MedVision AI — Hệ thống hỗ trợ chẩn đoán y khoa
      </div>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
</body>

</html>
